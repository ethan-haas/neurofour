name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: pip install -r requirements.txt
      - name: Run tests (fast subset)
        # The exhaustive perfect-agent solver test and the full-ladder bench
        # check each run for tens of minutes; they are excluded from CI and
        # run locally via `make bench`. Everything else is fast.
        run: |
          pytest tests/ -q \
            --ignore=tests/test_perfect_agent.py \
            --ignore=tests/test_run_bench_check.py

  frontend:
    name: Frontend (build + typecheck)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - name: Typecheck + build
        run: npm run build
